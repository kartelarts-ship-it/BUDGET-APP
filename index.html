<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>KaCorp Budget V3</title>
    <meta name="description" content="Maîtrisez vos finances. Visualisez vos dépenses. Avancez avec clarté." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#080E0A" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KaCorp Budget" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-96.png" />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; -webkit-text-size-adjust: 100%; }
      body {
        height: 100%;
        background: #080E0A;
        color: #F0F4F1;
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        padding-top: env(safe-area-inset-top);
      }
      #root { height: 100%; min-height: 100dvh; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
      input[type=number] { -moz-appearance: textfield; }
      input, button, textarea, select { font-family: inherit; }
      ::-webkit-scrollbar { width: 0; height: 0; }
      * { scrollbar-width: none; }
      ::selection { background: #D8B56D30; }
      img { -webkit-touch-callout: none; user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js', { scope: '/' })
            .then(reg => {
              console.log('[KACORP SW] Enregistré ✓', reg.scope);
              setInterval(() => reg.update(), 60000);
            })
            .catch(err => console.warn('[KACORP SW] Erreur:', err));
        });
      }
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
